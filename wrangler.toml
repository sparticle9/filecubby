name = "tgpan"
main = "src/index.ts"
compatibility_date = "2023-05-18"

[[d1_databases]]
binding = "METADB"
database_name = "tgpan"
database_id = "8511e92a-cf26-4c0a-bf8f-09587b93f9e7"

# KV namespaces section
[[kv_namespaces]]
binding = "TASKS"
id = "00000000000000000000000000000000"

[[kv_namespaces]]
binding = "USERS"
id = "00000000000000000000000000000000"

[[kv_namespaces]]
binding = "FILES"
id = "00000000000000000000000000000000"

[[kv_namespaces]]
binding = "FILE_DOWNLOAD_INFO"
id = "00000000000000000000000000000000"

[vars]
BOT_TOKEN = "<telegram-bot-token>"
CHANNEL_ID = "489042798"
MAX_CHUNK_SIZE = 20971520  # 20MB in bytes (20 * 1024 * 1024)
MAX_IMAGE_SIZE = 31457280  # 30MB in bytes, configurable
CACHE_CHUNK_URL_MAX_RETRY = 5
CACHE_CHUNK_URL_TIMEOUT = 10000  # 10 seconds in milliseconds
CACHE_CHUNK_TTL = 72  # 3 days in hours

[triggers]
crons = ["0 0 * * *"] # Run daily at midnight

[[analytics_engine_datasets]]
binding = "ANALYTICS_ENGINE"
dataset = "tgpan_analytics"