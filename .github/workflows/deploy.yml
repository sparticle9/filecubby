name: Deploy Filecubby

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - uses: actions/setup-go@v5
        with:
          go-version-file: cli/go.mod

      - run: pnpm install --frozen-lockfile

      - run: cd cli && go test ./...

      - run: pnpm run typecheck

      - run: pnpm run build
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - run: printf '%s' "$BOT_TOKEN" | pnpm exec wrangler secret put BOT_TOKEN
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}

      - run: printf '%s' "$CHAT_ID" | pnpm exec wrangler secret put CHAT_ID
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}

      - run: printf '%s' "$ADMIN_TOKEN" | pnpm exec wrangler secret put ADMIN_TOKEN
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}

      - run: pnpm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
