name: Deploy Filecubby

on:
  workflow_dispatch:
    inputs:
      cloudflare_account_id:
        description: "Cloudflare account ID; optional if environment variable CLOUDFLARE_ACCOUNT_ID is set"
        required: false
        default: ""
      chat_id:
        description: "Optional non-secret Telegram chat ID; leave blank for private-DM discovery"
        required: false
        default: ""
      worker_name:
        description: "Worker name"
        required: true
        default: "filecubby"
      namespace_prefix:
        description: "KV namespace prefix; leave blank to use worker_name"
        required: false
        default: ""
      public_url:
        description: "Optional public URL for smoke checks"
        required: false
        default: ""
      custom_domain:
        description: "Optional custom domain"
        required: false
        default: ""
      filecubby_marker:
        description: "Telegram caption/manifest marker"
        required: false
        default: "fc"
      telegram_organization_mode:
        description: "Telegram organization record mode"
        required: true
        type: choice
        options:
          - caption
          - off
          - manifest
        default: caption
      dry_run:
        description: "Generate config and run Wrangler dry-run without mutating Cloudflare"
        required: true
        type: boolean
        default: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: pnpm/action-setup@v6.0.7
        with:
          version: 10.33.0

      - uses: actions/setup-node@v6.4.0
        with:
          node-version-file: .node-version
          cache: pnpm

      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: cli/go.mod

      - run: pnpm install --frozen-lockfile

      - run: cd cli && go test ./...

      - run: pnpm run typecheck

      - name: Check required deployment credentials
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ inputs.cloudflare_account_id || vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: |
          missing=0
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::error::Missing Cloudflare account ID. Fill the workflow input cloudflare_account_id or set GitHub Actions variable CLOUDFLARE_ACCOUNT_ID."
            missing=1
          fi
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::error::Missing GitHub Actions secret CLOUDFLARE_API_TOKEN. GitHub cannot securely prompt for this in the Run workflow form; create it under Settings > Secrets and variables > Actions > Secrets."
            missing=1
          fi
          if [ -z "$BOT_TOKEN" ]; then
            echo "::error::Missing GitHub Actions secret BOT_TOKEN. GitHub cannot securely prompt for this in the Run workflow form; create it under Settings > Secrets and variables > Actions > Secrets."
            missing=1
          fi
          exit "$missing"

      - name: Provision and deploy
        run: node scripts/provisionCloudflare.mjs ${{ inputs.dry_run && '--dry-run' || '' }}
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ inputs.cloudflare_account_id || vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ inputs.chat_id || vars.CHAT_ID }}
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
          FILECUBBY_TOKEN: ${{ secrets.FILECUBBY_TOKEN }}
          FILECUBBY_WORKER_NAME: ${{ inputs.worker_name }}
          FILECUBBY_NAMESPACE_PREFIX: ${{ inputs.namespace_prefix || inputs.worker_name }}
          FILECUBBY_URL: ${{ inputs.public_url }}
          FILECUBBY_CUSTOM_DOMAIN: ${{ inputs.custom_domain }}
          FILECUBBY_MARKER: ${{ inputs.filecubby_marker }}
          TELEGRAM_ORGANIZATION_MODE: ${{ inputs.telegram_organization_mode }}
          WRANGLER_CONFIG_OUT: wrangler.provision.generated.toml
